services:
  node1:
    build: 
      context: .
      dockerfile: node/Dockerfile
    environment:
      - PORT=:8081
  node2:
    build: 
      context: .
      dockerfile: node/Dockerfile
    environment:
      - PORT=:8082
  node3:
    build: 
      context: .
      dockerfile: node/Dockerfile
    environment:
      - PORT=:8083
  node4:
    build: 
      context: .
      dockerfile: node/Dockerfile
    environment:
      - PORT=:8084
  node5:
    build: 
      context: .
      dockerfile: node/Dockerfile
    environment:
      - PORT=:8085
  lb:
    build: 
      context: .
      dockerfile: load_balancer/Dockerfile
    ports:
      - 8080:8080
    depends_on:
      - node1
      - node2
      - node3
      - node4
      - node5